# Research State — Central Project Tracking

project:
  title: "Ciclos de Protesto no Brasil — EOP, DOS e Análise de Conjuntura"
  question: >
    Como as configurações de estruturas de oportunidades políticas (EOP) e
    discursivas (DOS), lidas conjunturalmente pelos atores, condicionam a
    emergência, a dinâmica de fases e os desfechos dos ciclos de protesto no
    Brasil (Diretas Já, Fora Collor, Junho 2013, Impeachment Dilma)?
  status: active
  started: "2026-04-01"   # início real do projeto (sessões anteriores); repo desde 2026-06-10
  domain: "sociologia política — TPP / movimentos sociais / análise de conjuntura"
  method: >
    Comparação qualitativa de casos + codificação ordinal cycle_phases (8 variáveis,
    escala 0-3, 5 fases) + process tracing analítico; futuramente PEA via Acervo Folha.
  pi: "Gustavo Paccelli Costa (tese UFJF 2024 como fonte primária)"

components:
  artigo_triangulo:
    descricao: "Artigo teórico EOP–DOS–Análise de Conjuntura com estudo de caso (3 ciclos da tese)"
    local: "artigo/"
    status: "seções principais redigidas; falta consolidação final, diagrama/stepper e revisão"
  cycle_phases:
    descricao: "Dataset fase×ciclo com scores 0-3 validados (2026-06-05)"
    local: "data/cycle_phases.csv + codebook/cycle_phases_codebook.yaml"
    status: "scores fixados; periodização sob revisão (frente B)"
  quadro_hipoteses:
    descricao: "14 hipóteses em 3 famílias (H1 institucional, H2 discursiva, H3 integrada)"
    local: "docs/projeto.md (síntese); .docx completo a incorporar"
    status: "H1.2 com desenho de teste detalhado (process tracing + casos Coreia/Paraguai/Belarus)"
  pipeline_pea:
    descricao: "Scraper Acervo Folha + DoCA coder + dataset builder + kappa"
    local: "a incorporar (pipeline/)"
    status: "projetada em sessão anterior; scripts e configs fora do repo; aguarda credenciais"

frentes_abertas:
  - id: B
    titulo: "Refinamento da periodização"
    detalhe: >
      Junho 2013: avaliar fase de radicalização entre expansão e pico.
      Impeachment Dilma: cobrir lacunas 2015-09→2015-11 e 2016-04-18→2016-05-11;
      validar início em 2014-10-26.
    prioridade: alta
  - id: C
    titulo: "Estratégia de inferência causal"
    detalhe: "Process tracing por caso + comparação sistemática; operacionalizar teste de H1.2"
    prioridade: alta
  - id: D
    titulo: "Construção do banco protest_events"
    detalhe: "Incorporar scripts da pipeline ao repo; executar quando houver credenciais do Acervo Folha"
    prioridade: media

outer_loop:
  cycle: 2
  last_direction: pivot
  last_reflection: >
    2026-06-10: PIVOT — abandono do framework bootstrap da sessão (matrizes
    qualitativas próprias) em favor do desenho já consolidado do pesquisador
    (codebook cycle_phases, periodização 5 fases, 14 hipóteses, artigo do
    triângulo, pipeline PEA), trazido via documentos das sessões claude.ai.
    Os memorandos C1-C4 da sessão ficam como material exploratório de apoio
    (justificativas de scores e fontes verificadas) em experiments/.

workspace:
  projeto: "docs/projeto.md"
  findings: "findings.md"
  log: "research-log.md"
  artigo: "artigo/"
  codebook: "codebook/"
  data: "data/"
  literature_dir: "literature/"
  experiments_dir: "experiments/"
  to_human_dir: "to_human/"
