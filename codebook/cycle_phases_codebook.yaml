# Codebook — cycle_phases
# Projeto: Ciclos de Protesto no Brasil (agenda pós-defesa — Gustavo Paccelli Costa)
# Fonte: desenho teórico-metodológico do projeto + sessão de scoring validada em 2026-06-05
# Unidade de análise: fase de ciclo (cycle × phase)
# Escala ordinal: 0 = ausente/nulo | 1 = baixo/incipiente | 2 = moderado/presente | 3 = alto/determinante

periodizacao:
  fases: [articulacao, emergencia, expansao, pico, latencia, radicalizacao, declinio, desfecho]
  nota: >
    v3 validada em 2026-07-04 (ver docs/periodizacao-articulacao.md), a partir da
    tese Costa (2024). 24 fases (6 por ciclo). Duas fases não-canônicas específicas:
    "articulacao" (construção prévia de estruturas de mobilização e oportunidades
    antes da fase pública contenciosa) e "latencia" (vale entre expansão e pico).
  fase_articulacao:
    definicao: >
      Fase em que estruturas de mobilização e oportunidades políticas são
      construídas antes de o ciclo se tornar publicamente contencioso.
    ocorrencia:
      diretas_ja: "1982-11 a 1983-02 — eleições de 1982; governadores de oposição (Montoro/SP, Brizola/RJ); pré-campanha (grounding moderado)"
      fora_collor: "1991-11 a 1992-05 — articulação estudantil/intersetorial (Mische 2008); denúncia a partir de 01/06/1992 (CPMI PC Farias)"
      impeachment_dilma: "2014-10-27 a 2015-03-14 — pós-2º turno; Aécio (PSDB) contesta as urnas; mobilização eleitoral reativa (McAdam & Tarrow 2011; Tatagiba 2018)"
      junho_2013: "AUSENTE — ações prévias do MPL (Revolta do Buzu 2003; MPL-Brasil/FSM 2005) são esporádicas; junho é ruptura de amplitude, não articulação (Costa 2024, §3.3.2)"
  fase_radicalizacao:
    definicao: >
      Específica de Junho 2013 (21/06–31/07): após a violência policial contra
      manifestantes (13/06) e o confronto com black blocs (17/06), e após o pico
      (20/06) com a retirada do MPL (21/06), o repertório radicaliza (predomínio
      black bloc) e a DOS se inverte pela 2ª vez (recriminalização midiática).
      Fundamento: Costa (2024, §3.3.3); della Porta (2018); Dobry (2015).
  fase_latencia:
    definicao: >
      Vale de mobilização entre expansão e pico. No ciclo Dilma: 2015-08-17 a
      2015-12-01, entre o ato de 16/08/2015 e a admissibilidade do impeachment
      (02/12/2015). Adotada da revisão dos artefatos (cycle_phases_v4).
  nota_comparacao: >
    Em tabelas comparativas 4×N, articulacao/latencia/radicalizacao podem ser
    agregadas às fases canônicas vizinhas conforme a análise.

blocos:
  oportunidades_politicas:
    op_abertura_institucional:
      descricao: "Grau de abertura do sistema político a demandas externas"
      fundamento: "Tarrow (2009); McAdam (1982); Kriesi et al. (1995)"
    op_divisao_elites:
      descricao: "Divisão ou dissensão entre elites governantes"
      fundamento: "Tarrow (2009); McAdam, Tarrow & Tilly (2001) — defecção de elites"
    op_aliados_influentes:
      descricao: "Presença de aliados dentro do sistema político"
      fundamento: "Tarrow (2009)"
    op_crise_legitimidade:
      descricao: "Crise de legitimidade do governo/regime"
      fundamento: "Costa (2024); Weyland (1993)"
    op_repressao:
      descricao: "Nível de repressão estatal ao protesto (codificação NÃO invertida: 3 = repressão alta)"
      fundamento: "Tarrow (2009); della Porta (2018) — repressão como detonador em 2013"
  traducao_institucional:
    traducao_institucional:
      descricao: "Grau em que o resultado é obtido por canal institucional distinto do demandado (ex.: Diretas Já perde a emenda mas elege Tancredo no Colégio Eleitoral)"
      fundamento: "Costa (2024); nota_consolidada_v2 dos artefatos (2026). Escala 0-3; incorporada em 2026-07-04"
  oportunidades_discursivas:
    od_visibilidade_midia:
      descricao: "Cobertura e enquadramento midiático favorável"
      fundamento: "Koopmans & Olzak (2004) — visibilidade; Ferree et al. (2002) — mídia como gatekeeper"
    od_ressonancia_discursiva:
      descricao: "Ressonância dos frames do movimento junto ao público"
      fundamento: "Koopmans & Statham (1999); Snow & Benford (1988); Ferree (2003)"
    od_legitimidade_narrativa:
      descricao: "Legitimidade pública da narrativa dos manifestantes"
      fundamento: "Koopmans & Olzak (2004) — legitimidade; McCammon et al. (2007)"

ciclos:
  - id: diretas_ja
    nome: "Diretas Já"
    periodo: "1983-03 a 1985-03"
  - id: fora_collor
    nome: "Fora Collor"
    periodo: "1991-11 a 1992-12 (articulação desde nov/1991)"
  - id: junho_2013
    nome: "Junho de 2013"
    periodo: "2013-06 a 2013-12"
  - id: impeachment_dilma
    nome: "Impeachment Dilma"
    periodo: "2014-10 a 2016-09"

dataset_irmao:
  protest_events:
    descricao: >
      Dataset no nível do evento de protesto (PEA), a construir via Acervo Folha
      com pipeline DoCA (scraper Playwright → coder via API Anthropic →
      dataset builder → confiabilidade intercodificadores via Cohen's Kappa).
    codebook: "doca_codebook.yaml (claim codes de 4 dígitos em 9 domínios; repertórios de Tilly; escalas de multidão)"
    status: "pipeline projetada; scripts a incorporar ao repositório; extração pendente de credenciais do Acervo Folha"
